name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-check:
    name: Release check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Run release check
        run: scripts/release_check.sh

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

      # Rendering is pure computation, so a macOS-built binary must produce
      # byte-identical output to the committed goldens. This exercises the
      # macOS-specific ioctl/FFI path in sys.rs and validates the cross-platform
      # claim that ubuntu-only CI cannot.
      - name: Smoke against goldens
        run: |
          out="${TMPDIR:-/tmp}/nyancat-macos-smoke"
          env TERM=xterm-256color target/release/nyancat --frames 1 --no-title --no-clear --no-counter > "$out-normal.out"
          cmp tests/golden/normal.out "$out-normal.out"
          env TERM=xterm-256color target/release/nyancat --truecolor --frames 1 --no-title --no-clear --no-counter > "$out-truecolor.out"
          cmp tests/golden/truecolor.out "$out-truecolor.out"
