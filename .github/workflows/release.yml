name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build a release for (e.g. v1.6.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Run release check
        run: scripts/release_check.sh

      - name: Build release archive
        id: archive
        run: |
          archive=$(scripts/release_archive.sh | sed -n 's/^release archive: //p')
          test -f "$archive"
          echo "path=$archive" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" --generate-notes --verify-tag || echo "release already exists; updating assets"
          gh release upload "$TAG" "${{ steps.archive.outputs.path }}" --clobber

  macos:
    name: macOS release artifact
    needs: linux
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release archive
        id: archive
        run: |
          archive=$(scripts/release_archive.sh | sed -n 's/^release archive: //p')
          test -f "$archive"
          echo "path=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload macOS asset to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" "${{ steps.archive.outputs.path }}" --clobber
